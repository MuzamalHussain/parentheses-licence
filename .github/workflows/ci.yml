name: CI

on:
  push:
    branches:
      - main
      - master
      - develop
  pull_request:

permissions:
  contents: read

jobs:
  backend:
    name: Backend Quality Gates
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    env:
      NODE_ENV: test
      APP_ENV: test
      MONGO_URI: mongodb://127.0.0.1:27017/parentheses_ci
      MONGO_DB_NAME: parentheses_ci
      JWT_ACCESS_SECRET: ci_access_secret_abcdefghijklmnopqrstuvwxyz123456
      JWT_REFRESH_SECRET: ci_refresh_secret_abcdefghijklmnopqrstuvwxyz123456
      REDIS_ENABLED: "false"
      ENABLE_STRIPE: "false"
      ENABLE_LOCAL_PSP: "false"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint backend
        run: npm run lint

      - name: Build backend
        run: npm run build

      - name: Test backend
        run: npm test

      - name: Audit backend dependencies
        run: npm audit --audit-level=high --omit=dev

      - name: Verify production readiness
        env:
          NODE_ENV: production
          APP_ENV: production
          DEPLOYMENT_TARGET: ci
          CLIENT_URL: https://app.parentheses.example
          MONGO_URI: mongodb+srv://ci-user:ci-password@cluster.example.com/parentheses_ci?retryWrites=true&w=majority
          MONGO_DB_NAME: parentheses_ci
          JWT_ACCESS_SECRET: ci_prod_access_secret_abcdefghijklmnopqrstuvwxyz1234567890
          JWT_REFRESH_SECRET: ci_prod_refresh_secret_abcdefghijklmnopqrstuvwxyz1234567890
          SMTP_HOST: smtp.example.com
          SMTP_PORT: 587
          SMTP_USER: no-reply@parentheses.example
          SMTP_PASS: ci_smtp_secret_abcdefghijklmnopqrstuvwxyz
          SMTP_FROM: Parentheses <no-reply@parentheses.example>
          ENABLE_STRIPE: "true"
          STRIPE_SECRET_KEY: sk_live_ci_validlookingsecret123456789
          STRIPE_WEBHOOK_SECRET: whsec_ci_validlookingsecret123456789
          ENABLE_LOCAL_PSP: "false"
          REDIS_ENABLED: "false"
          BACKUP_READINESS_STRICT: "false"
        run: npm run check:production-readiness

      - name: Upload backend artifact
        uses: actions/upload-artifact@v4
        with:
          name: backend-source
          path: |
            backend/src
            backend/package.json
            backend/Dockerfile

  frontend:
    name: Frontend Quality Gates
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint frontend
        run: npm run lint

      - name: Build frontend
        env:
          VITE_API_URL: https://api.parentheses.example/api/v1
        run: npm run build

      - name: Test frontend
        run: npm test

      - name: Audit frontend dependencies
        run: npm audit --audit-level=high

      - name: Upload frontend artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist

  release-readiness:
    name: Release Readiness
    runs-on: ubuntu-latest
    needs:
      - backend
      - frontend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Verify workflows
        run: npm run verify:workflows

      - name: Generate release summary
        run: npm run verify:release

      - name: Upload release summary
        uses: actions/upload-artifact@v4
        with:
          name: release-summary
          path: artifacts
